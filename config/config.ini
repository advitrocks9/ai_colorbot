# ai_colorbot — runtime configuration
# Edit values here; the overlay GUI writes back changes automatically.

# ── Capture ────────────────────────────────────────────────────────────────────
detection_resolution = 320       ; square crop size fed to the detector (px)
capture_fps = 100                ; capture target FPS (0 = uncapped)
capture_use_cuda = false         ; GPU-accelerated DXGI → CUDA zero-copy path
circle_mask = false              ; apply circular crop to remove corners
monitor_idx = 0                  ; monitor index (0 = primary)

# ── Target ─────────────────────────────────────────────────────────────────────
disable_headshot = false
body_y_offset = 0.15             ; fractional Y offset within body bounding box
head_y_offset = 0.05             ; fractional Y offset within head bounding box

# ── Mouse ──────────────────────────────────────────────────────────────────────
dpi = 1000
sensitivity = 4.0
fovX = 50                        ; horizontal FOV (degrees)
fovY = 50                        ; vertical FOV (degrees)
pid_kp = 0.50
pid_ki = 0.00
pid_kd = 0.00

# ── Keybinds ───────────────────────────────────────────────────────────────────
triggerbot_key = 4               ; mouse button index (4 = side button)
aimbot_key = 2                   ; mouse button index (2 = middle)

# ── AI ─────────────────────────────────────────────────────────────────────────
ai_model = yolo10.engine
confidence_threshold = 0.15
nms_threshold = 0.50
max_detections = 100
postprocess = yolo10             ; decoder variant: yolo8|yolo9|yolo10|yolo11|yolo12
export_precision = 16            ; engine export precision: 8 (INT8) or 16 (FP16)

# ── CUDA ───────────────────────────────────────────────────────────────────────
use_cuda_graph = false           ; use CUDA graphs for repeated inference
use_pinned_memory = true         ; pinned host memory for faster H2D transfers

# ── Custom Class IDs ───────────────────────────────────────────────────────────
class_player = 0
class_bot = 1
class_weapon = 2
class_outline = 3
class_dead_body = 4
class_hideout_target_human = 5
class_hideout_target_balls = 6
class_head = 7
class_smoke = 8
class_fire = 9
class_third_person = 10

# ── Per-Class Detect & Color ───────────────────────────────────────────────────
detect = true,false,false,false,false,false,false,true,false,false,false
color  = true,false,false,false,false,false,false,true,false,false,false

# ── Debug Window ───────────────────────────────────────────────────────────────
show_window = true
show_fps = true
window_size = 80                 ; percentage of detection_resolution for display
always_on_top = true
verbose = false

# ── Colorbot HSV ───────────────────────────────────────────────────────────────
hsv_lower_h = 35
hsv_lower_s = 100
hsv_lower_v = 100
hsv_upper_h = 85
hsv_upper_s = 255
hsv_upper_v = 255
contour_area = 10.0              ; minimum contour area threshold (px²)
